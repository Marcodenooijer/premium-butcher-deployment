upstream frontend_upstream {
    server frontend:80;
}

upstream backend_upstream {
    server backend:3000;
}

server {
    listen 80;
    server_name biologischvleeschatelier.profile.elysia.marketing;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$host$request_uri;
    }
    
    # Allow Google Wallet to fetch images
    location ~ ^/(Romano-logo\.png|Romano_wallet_hero\.png)$ {
        # Allow CORS for Google Wallet
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        
        # Disable any hotlink protection for these specific files
        # Allow Google's servers
        if ($http_user_agent ~* "google|bot") {
            add_header X-Allowed "Google" always;
        }
        
        # Serve the file
        try_files $uri =404;
    }
}

server {
    listen 443 ssl;
    server_name biologischvleeschatelier.profile.elysia.marketing;
    
    ssl_certificate /etc/letsencrypt/live/biologischvleeschatelier.profile.elysia.marketing/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/biologischvleeschatelier.profile.elysia.marketing/privkey.pem;
    
    # Frontend - Allow caching of static assets only
    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # No cache for HTML files (so app always gets fresh version)
        location ~* \.(html)$ {
            proxy_pass http://frontend_upstream;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
        }
    }
    
    # ALL API endpoints - ABSOLUTELY NO CACHING
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable ALL caching for API calls
        proxy_cache off;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        proxy_buffering off;
        
        # Force no-cache headers to browser
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Cache-Status "BYPASS" always;
    }
    
    # Health check endpoint
    location /health {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # No cache for health checks
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
}
