networks:
  premium-butcher-network:
    driver: bridge
services:
  backend:
    build: ./backend
    container_name: premium-butcher-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_NAME: premium_butcher
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT: 5432
      DB_USER: butcher_user
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      NODE_ENV: production
    healthcheck:
      interval: 30s
      retries: 3
      test:
      - CMD
      - wget
      - --spider
      - -q
      - http://localhost:3000/health
      timeout: 10s
    networks:
    - premium-butcher-network
  certbot:
    container_name: premium-butcher-certbot
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h &
      wait $${!}; done;'
    image: certbot/certbot
    volumes:
    - certbot_conf:/etc/letsencrypt
    - certbot_data:/var/www/certbot
    - ./nginx/ssl:/etc/nginx/ssl:ro
  frontend:
    build:
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_FEATURE_FLAG_ETHNICITY: ${VITE_FEATURE_FLAG_ETHNICITY}
        VITE_FEATURE_FLAG_NATIONALITY: ${VITE_FEATURE_FLAG_NATIONALITY}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_PUBLIC_POSTHOG_HOST: ${VITE_PUBLIC_POSTHOG_HOST}
        VITE_PUBLIC_POSTHOG_KEY: ${VITE_PUBLIC_POSTHOG_KEY}
      context: ./frontend
    container_name: premium-butcher-frontend
    depends_on:
    - backend
    networks:
    - premium-butcher-network
  nginx:
    command: /bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done
      & nginx -g "daemon off;"'
    container_name: premium-butcher-nginx
    depends_on:
    - frontend
    - backend
    image: nginx:alpine
    networks:
    - premium-butcher-network
    ports:
    - 80:80
    - 443:443
    volumes:
    - ./nginx/conf.d:/etc/nginx/conf.d
    - certbot_conf:/etc/letsencrypt
    - certbot_data:/var/www/certbot
    - ./nginx/ssl:/etc/nginx/ssl:ro
  nocodb:
    container_name: premium-butcher-nocodb
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NC_AUTH_JWT_SECRET: ${NOCODB_JWT_SECRET:-change-this-to-a-random-secret-key}
      NC_DB: pg://postgres:5432?u=butcher_user&p=${DB_PASSWORD}&d=premium_butcher
      NC_PUBLIC_URL: https://nocodb.profile.elysia.marketing
    image: nocodb/nocodb:latest
    networks:
    - premium-butcher-network
    restart: unless-stopped
    volumes:
    - nocodb_data:/usr/app/data
  postgres:
    container_name: premium-butcher-db
    environment:
      POSTGRES_DB: premium_butcher
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: butcher_user
    healthcheck:
      interval: 10s
      retries: 5
      test:
      - CMD-SHELL
      - pg_isready -U butcher_user
      timeout: 5s
    image: postgres:15
    networks:
    - premium-butcher-network
    volumes:
    - postgres_data:/var/lib/postgresql/data
version: '3.8'
volumes:
  certbot_conf: null
  certbot_data: null
  nocodb_data: null
  postgres_data: null
